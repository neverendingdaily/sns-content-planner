const buildMockCalendar = (selectedIds, postsPerWeek, month, year) => {
  const selected = MOCK_TOPICS.filter(t => selectedIds.includes(t.id));
  const daysInMonth = new Date(year, month, 0).getDate();
  const totalPosts = Math.min(selected.length, Math.round(postsPerWeek * 4.33));
  const postTopics = selected.slice(0, totalPosts);

  const usedDays = new Set();
  const postDays = {};
  postTopics.forEach((topic, i) => {
    let day = Math.round((daysInMonth / (totalPosts + 1)) * (i + 1));
    day = Math.min(Math.max(day, 1), daysInMonth);
    while (usedDays.has(day) && day < daysInMonth) day++;
    if (day <= daysInMonth && !usedDays.has(day)) {
      usedDays.add(day);
      postDays[day] = topic;
    }
  });

  return Array.from({ length: daysInMonth }, (_, i) => {
    const d = i + 1;
    if (postDays[d]) {
      const t = postDays[d];
      return {
        date: d, platform: t.platform, title: t.title,
        postType: t.category.split("・")[0],
        type: t.type, pillar: t.category,
      };
    }
    return { date: d };
  });
};

/* ============================================================

function Step0({ onNext }) {
  const [imgs, setImgs]     = useState([]);
  const [kgi, setKgi]       = useState("");
  const [tone, setTone]     = useState("");
  const [loading, setLoading] = useState(false);

  const [done, setDone]     = useState(false);
  const fileRef             = useRef();
  const chatEndRef          = useRef();
  const timersRef           = useRef([]);

  const addFiles = files => {
    Array.from(files).slice(0, 3 - imgs.length).forEach(f => {
      const r = new FileReader();
      r.onload = e => setImgs(prev => [...prev, { src:e.target.result, name:f.name }].slice(0, 3));
      r.readAsDataURL(f);
    });
  };

  // Cleanup timers on unmount
  useEffect(() => () => timersRef.current.forEach(clearTimeout), []);

  useEffect(() => {
    if (chat.length > 0) chatEndRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [chat]);

  const analyze = () => {
    setLoading(true);
    setChat([]);
    setDone(false);

    /*
      AI実装時:
      callClaude(step0Prompt(imgs.map(i=>i.name).join(", "), kgi, tone))
        .then(msgs => msgs.forEach((msg, i) => { ... }))

    MOCK_CHAT.forEach(msg => {
      const t = setTimeout(() => {
        setChat(prev => [...prev, msg]);
        if (msg.id === MOCK_CHAT.length) {
          setLoading(false);
          setDone(true);
        }
      }, msg.delay);
      timersRef.current.push(t);
    });

  const ready = kgi.trim().length > 3;

        </Card>

        <Card>
          <SectionLabel icon={<Icons.Target size={13} />}>今月の目的（KGI / KPI）</SectionLabel>
          <textarea value={kgi} onChange={e => setKgi(e.target.value)} rows={3}
            placeholder="例：フォロワー+200人、メルマガ登録CVR 3%、保存率 5%以上"

        <Card>

        </Card>

        <PBtn onClick={analyze} loading={loading} disabled={!ready || loading}>

      </div>

      {/* RIGHT — AI Chat */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

  );

    setLoading(true);

      callClaude(step2Prompt(concept.mainConcept, concept.weeks))
        .then(data => { setTopics(data); setSelected(new Set(data.map(t=>t.id))); })
        .finally(() => setLoading(false));
    */
    setTimeout(() => {
      setTopics(MOCK_TOPICS);
      setSelected(new Set(MOCK_TOPICS.map(t => t.id)));
      setLoading(false);
    }, 2200);

    const n = new Set(prev);
    n.has(id) ? n.delete(id) : n.add(id);

  });

    if (topics && selected.size === topics.length) setSelected(new Set());

          style={{ padding:"8px 16px", fontSize:12, flexShrink:0 }}>

                return (
                  <button key={cat} onClick={() => setActiveTab(cat)} style={{
                    padding:"6px 14px", borderRadius:99, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
                    background: activeTab === cat ? C.primary : "#f5f5f4",
                    color: activeTab === cat ? "#fff" : C.muted,
                    transition:"all 0.15s",
                  }}>
                    {cat === "all" ? "すべて" : cat.split("・")[0]} {selCount}/{count}
                  </button>
                );
              })}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:12, fontWeight:700, color:C.primary }}>{selected.size} / {topics.length} 選択中</span>
              <SBtn onClick={toggleAll} style={{ padding:"5px 12px", fontSize:11 }}>
                {selected.size === topics.length ? "全解除" : "全選択"}
              </SBtn>
            </div>
          </div>

          {/* Topic List */}
          <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
            {filtered.map(t => {
              const isSel = selected.has(t.id);
              return (
                <div key={t.id} onClick={() => toggle(t.id)} style={{
                  display:"flex", alignItems:"center", gap:12, padding:"12px 16px",
                  background: isSel ? "#fff" : "#fafaf9",
                  border:`1px solid ${isSel ? "#c7d2fe" : C.border}`,
                  borderRadius:12, cursor:"pointer",
                  opacity: isSel ? 1 : 0.5,
                  transition:"all 0.15s",
                }}>
                  <div style={{
                    width:20, height:20, borderRadius:6, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center",
                    background: isSel ? C.primary : "#f5f5f4",
                    border:`1px solid ${isSel ? C.primary : C.border}`,
                    transition:"all 0.15s",
                  }}>
                    {isSel && <Icons.Check size={11} style={{ color:"#fff" }} />}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <p style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:4, lineHeight:1.4 }}>{t.title}</p>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                      <CatBadge cat={t.category} />
                      <PlatformBadge platform={t.platform} />
                      <span style={{ fontSize:10, color:C.subtle, fontWeight:500 }}>{t.type}  ·  第{t.week}週</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Footer Actions */}
          <div style={{ display:"flex", gap:10 }}>
            <SBtn onClick={onBack} style={{ flex:1 }}>← 戻る</SBtn>
            <PBtn onClick={() => onNext([...selected])} disabled={selected.size === 0} style={{ flex:3 }}>
              <Icons.Check size={15} />
              {selected.size}件を承認してSTEP 3へ
              <Icons.ArrowRight size={15} />
            </PBtn>
          </div>
        </>
      )}
    </div>
  );
}

/* ============================================================
   STEP 3: カレンダーマッピング
   ============================================================ */
function Step3({ selectedIds, concept, onBack }) {
  const today    = new Date();
  const month    = today.getMonth() + 1;
  const year     = today.getFullYear();
  const [postsPerWeek, setPostsPerWeek] = useState(5);
  const [platforms, setPlatforms]       = useState(["Threads", "X", "Instagram"]);
  const [calData, setCalData]           = useState(null);
  const [loading, setLoading]           = useState(false);
  const [view, setView]                 = useState("grid");

  const togglePlatform = p => setPlatforms(prev =>
    prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]
  );

  const generate = () => {
    setLoading(true);
    /*
      AI実装時:
      const sys = `承認済みアイデアリストを消費しながら、運用リソースに合わせてカレンダーに割り当てる。制約: ${concept.mainConcept}`;
      callClaude(step3Prompt(selected, postsPerWeek, platforms, month, year), sys)
        .then(setCalData).finally(() => setLoading(false));
    */
    setTimeout(() => {
      setCalData(buildMockCalendar(selectedIds, postsPerWeek, month, year));
      setLoading(false);
    }, 3000);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ concept, calendar:calData }, null, 2)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `sns-plan-${year}-${String(month).padStart(2,"0")}.json`;
    a.click();
  };

  const exportCSV = () => {
    if (!calData) return;
    const rows = calData.filter(d => d.title).map(d => [d.date, d.platform, d.title, d.postType, d.type, d.pillar]);
    const csv = [["日付","PF","タイトル","種別","形式","柱"], ...rows]
      .map(r => r.map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `sns-plan-${year}-${String(month).padStart(2,"0")}.csv`;
    a.click();
  };

  const firstDay    = new Date(year, month - 1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const DAY_LABELS  = ["日","月","火","水","木","金","土"];

  const postCount = calData ? calData.filter(d => d.title).length : 0;

  return (
    <div className="fadeUp" style={{ display:"flex", flexDirection:"column", gap:20 }}>
      {/* Resource Config — shown when no calendar yet */}
      {!calData && (
        <Card>
          <p style={{ fontWeight:800, fontSize:15, color:C.text, marginBottom:18, fontFamily:"'Sora', sans-serif" }}>運用リソースの設定</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22 }}>
            <div>
              <SectionLabel icon={<Icons.Calendar size={13} />}>週間投稿回数</SectionLabel>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {[3, 4, 5, 7, 10, 14].map(n => (
                  <button key={n} onClick={() => setPostsPerWeek(n)} style={{
                    padding:"8px 16px", borderRadius:10, fontSize:13, cursor:"pointer",
                    border:`1px solid ${postsPerWeek === n ? C.primary : C.border}`,
                    background: postsPerWeek === n ? C.primaryLight : "#fff",
                    color: postsPerWeek === n ? C.primary : C.muted,
                    fontWeight: postsPerWeek === n ? 700 : 500,
                    transition:"all 0.15s",
                  }}>週{n}回</button>
                ))}
              </div>
            </div>
            <div>
              <SectionLabel icon={<Icons.Users size={13} />}>使用プラットフォーム</SectionLabel>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {["Threads", "X", "Instagram"].map(p => (
                  <button key={p} onClick={() => togglePlatform(p)} style={{
                    padding:"8px 16px", borderRadius:10, fontSize:12, cursor:"pointer",
                    border:`1px solid ${platforms.includes(p) ? C.primary : C.border}`,
                    background: platforms.includes(p) ? C.primaryLight : "#fff",
                    color: platforms.includes(p) ? C.primary : C.muted,
                    fontWeight: platforms.includes(p) ? 700 : 500,
                    transition:"all 0.15s",
                  }}>{p}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Concept summary */}
          <div style={{ marginTop:18, padding:"12px 16px", background:"#f8f7f6", borderRadius:10, display:"flex", alignItems:"center", gap:10 }}>
            <Icons.Lock size={13} style={{ color:C.primary, flexShrink:0 }} />
            <p style={{ fontSize:12, color:C.muted }}>
              承認アイデア: <strong style={{ color:C.text }}>{selectedIds.length}件</strong>　　
              コンセプト: <strong style={{ color:C.text }}>{concept?.mainConcept}</strong>
            </p>
          </div>

          <div style={{ display:"flex", gap:10, marginTop:18 }}>
            <SBtn onClick={onBack} style={{ flex:1 }}>← 戻る</SBtn>
            <PBtn onClick={generate} loading={loading} disabled={platforms.length === 0} style={{ flex:3 }}>
              <Icons.Calendar size={15} />
              {!loading && `承認${selectedIds.length}件で30日カレンダーを生成`}
            </PBtn>
          </div>
        </Card>
      )}

      {/* Calendar Result */}
      {calData && (
        <div className="fadeUp">
          {/* Header Controls */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
            <div>
              <p style={{ fontWeight:800, fontSize:16, color:C.text, fontFamily:"'Sora', sans-serif" }}>
                {year}年{month}月 投稿カレンダー
              </p>
              <p style={{ fontSize:12, color:C.muted, marginTop:3 }}>
                {postCount}件の投稿 ／ 週{postsPerWeek}回ペース ／ {platforms.join("・")}
              </p>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <SBtn onClick={() => setView(v => v === "grid" ? "list" : "grid")} style={{ padding:"7px 13px", fontSize:12 }}>
                {view === "grid"
                  ? <><Icons.List size={13} /> リスト表示</>
                  : <><Icons.Grid size={13} /> グリッド表示</>}
              </SBtn>
              <SBtn onClick={() => { setCalData(null); }} style={{ padding:"7px 13px", fontSize:12 }}>
                <Icons.Refresh size={13} /> 再設定
              </SBtn>
            </div>
          </div>

          {/* Legend */}
          <div style={{ display:"flex", gap:12, marginBottom:14, flexWrap:"wrap" }}>
            {[["教育","#4f46e5","#eef2ff"],["共感","#9d174d","#fce7f3"],["CTA","#92400e","#fffbeb"],["エンタメ","#166534","#f0fdf4"]].map(([label, fg, bg]) => (
              <div key={label} style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:10, height:10, borderRadius:3, background:bg, border:`1px solid ${fg}20` }} />
                <span style={{ fontSize:11, color:C.muted }}>{label}</span>
              </div>
            ))}
            <div style={{ display:"flex", alignItems:"center", gap:5 }}>
              <div style={{ width:10, height:10, borderRadius:3, background:"#fafaf9", border:`1px solid ${C.border}` }} />
              <span style={{ fontSize:11, color:C.subtle }}>投稿なし</span>
            </div>
          </div>

          {/* Grid View */}
          {view === "grid" && (
            <Card style={{ padding:16 }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4, marginBottom:8 }}>
                {DAY_LABELS.map(d => (
                  <div key={d} style={{ textAlign:"center", fontSize:11, fontWeight:700, color:d==="日"?"#ef4444":d==="土"?"#3b82f6":C.subtle, padding:"4px 0" }}>{d}</div>
                ))}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4 }}>
                {Array.from({ length:firstDay }, (_,i) => <div key={`e${i}`} />)}
                {calData.map(day => {
                  const hasPost = !!day.title;
                  const c = CAT_COLORS[day.postType] || {};
                  return (
                    <div key={day.date} title={hasPost ? `${day.date}日 ${day.platform} - ${day.title}` : `${day.date}日 (投稿なし)`}
                      style={{
                        minHeight:78, borderRadius:8, padding:"6px 7px",
                        background: hasPost ? c.bg : "#fafaf9",
                        border:`1px solid ${hasPost ? c.border : C.border}`,
                        cursor: hasPost ? "default" : "default",
                      }}>
                      <p style={{ fontSize:10, fontWeight:700, color: hasPost ? c.fg : C.subtle, marginBottom:3 }}>{day.date}</p>
                      {hasPost && (
                        <>
                          <p style={{ fontSize:9, color:c.fg, fontWeight:700, lineHeight:1.3, marginBottom:2 }}>{day.platform}</p>
                          <p style={{ fontSize:9, color:C.text, lineHeight:1.4, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical" }}>{day.title}</p>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          {/* List View */}
          {view === "list" && (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {calData.filter(d => d.title).map(day => {
                const c = CAT_COLORS[day.postType] || {};
                return (
                  <Card key={day.date} style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:14, borderLeft:`4px solid ${c.border || C.border}` }}>
                    <div style={{ width:38, textAlign:"center", flexShrink:0 }}>
                      <p style={{ fontSize:9, color:C.subtle, fontWeight:700 }}>{month}月</p>
                      <p style={{ fontSize:22, fontWeight:900, color:C.text, lineHeight:1, fontFamily:"'Sora', sans-serif" }}>{day.date}</p>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <p style={{ fontWeight:700, fontSize:13, color:C.text, marginBottom:5, lineHeight:1.4 }}>{day.title}</p>
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                        <PlatformBadge platform={day.platform} />
                        <CatBadge cat={day.pillar} />
                        <span style={{ fontSize:10, color:C.subtle }}>{day.type}</span>
                      </div>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          {/* Export Footer */}
          <div style={{ marginTop:16, padding:"18px 22px", background:"linear-gradient(135deg, #1e293b, #0f172a)", borderRadius:16, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
            <div>
              <p style={{ fontWeight:700, fontSize:14, color:"#f8fafc", marginBottom:3 }}>✅ 30日間の計画が完成しました</p>
              <p style={{ fontSize:12, color:"#64748b", lineHeight:1.65 }}>
                BufferやCanva Content Plannerに取り込んで予約投稿を設定してください。
              </p>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={exportJSON} style={{ display:"flex", alignItems:"center", gap:5, padding:"8px 14px", background:"#334155", color:"#e2e8f0", border:"none", borderRadius:9, cursor:"pointer", fontSize:12, fontWeight:600 }}>
                <Icons.Download size={13} /> JSON
              </button>
              <button onClick={exportCSV} style={{ display:"flex", alignItems:"center", gap:5, padding:"8px 14px", background:"#334155", color:"#e2e8f0", border:"none", borderRadius:9, cursor:"pointer", fontSize:12, fontWeight:600 }}>
                <Icons.Download size={13} /> CSV
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [step, setStep]           = useState(0);
  const [concept, setConcept]     = useState(null);
  const [selectedIds, setSelectedIds] = useState([]);

  const STEP_TITLES = [
    "全体像の把握と資料リクエスト",
    "今月の軸の確定",
    "ネタ帳（トピックツリー）の生成",
    "カレンダーマッピング",
  ];

  const STEP_DESCS = [
    "雑誌の表紙・目次などを読み込み、AIが深掘りすべきトピックと追加資料をリクエストします",
    "追加資料と発信者の個人エピソードを統合し、今月のコアコンセプトと週次テーマを確定します",
    "確定したコンセプトを元に投稿アイデアを大量生成。不要なものを除いて承認します",
    "承認済みアイデアと運用リソースを掛け合わせ、30日分の投稿カレンダーを自動生成します",
  ];

  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      {/* Header */}
      <header style={{ background:C.card, borderBottom:`1px solid ${C.border}`, padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:36, height:36, background:`linear-gradient(135deg, ${C.primary}, ${C.primaryDark})`, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Icons.Calendar size={18} style={{ color:"#fff" }} />
          </div>
          <div>
            <p style={{ fontWeight:800, fontSize:15, color:C.text, fontFamily:"'Sora', sans-serif" }}>SNS Content Planner</p>
            <p style={{ fontSize:10, color:C.subtle }}>v2 — 4ステップ計画ウィザード</p>
          </div>
        </div>
        <p style={{ fontSize:11, color:C.subtle }}>Powered by Claude API</p>
      </header>

      {/* Progress Bar */}
      <ProgressBar current={step} />

      {/* Step Header */}
      <div style={{ maxWidth:960, margin:"0 auto", padding:"28px 24px 0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:6 }}>
          <div style={{ width:30, height:30, background:`linear-gradient(135deg, ${C.primary}, ${C.primaryDark})`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <span style={{ color:"#fff", fontWeight:800, fontSize:13, fontFamily:"'Sora', sans-serif" }}>{step}</span>
          </div>
          <h2 style={{ fontWeight:800, fontSize:18, color:C.text, fontFamily:"'Sora', sans-serif" }}>
            {STEP_TITLES[step]}
          </h2>
        </div>
        <p style={{ fontSize:13, color:C.muted, paddingLeft:42, marginBottom:20, lineHeight:1.65 }}>
          {STEP_DESCS[step]}
        </p>
      </div>

      {/* Main Content */}
      <main style={{ maxWidth:960, margin:"0 auto", padding:"0 24px 80px" }}>
        {step === 0 && (
          <Step0 onNext={() => setStep(1)} />
        )}
        {step === 1 && (
          <Step1
            onNext={c => { setConcept(c); setStep(2); }}
            onBack={() => setStep(0)}
          />
        )}
        {step === 2 && (
          <Step2
            concept={concept}
            onNext={ids => { setSelectedIds(ids); setStep(3); }}
            onBack={() => setStep(1)}
          />
        )}
        {step === 3 && (
          <Step3
            selectedIds={selectedIds}
            concept={concept}
            onBack={() => setStep(2)}
          />
        )}
      </main>

      <footer style={{ borderTop:`1px solid ${C.border}`, padding:"20px 24px", textAlign:"center" }}>
        <p style={{ fontSize:11, color:"#d6d3d1" }}>
          SNS Content Planner v2 — 4ステップ計画ウィザード ｜ Powered by Claude API ｜ テーマブレ防止設計
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
